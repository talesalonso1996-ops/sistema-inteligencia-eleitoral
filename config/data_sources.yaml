# Fontes de dados oficiais utilizadas pelo sistema.
# Cada entrada registra origem, ano, arquivo local esperado e metodologia,
# conforme exigido no diagnostico (secao 3 e 4 do briefing): nenhuma variavel
# pode ser usada sem origem, arquivo, ano e metodologia documentados.
#
# `arquivo_local` aponta para o PACOTE REDUZIDO (Parquet/GeoParquet, apenas
# colunas usadas, filtrado para SP quando a fonte original e nacional) -
# gerado por scripts/preparar_dados_cloud.py a partir dos arquivos oficiais
# completos (`arquivo_zip_original`/`url_padrao`). Mesma informacao oficial,
# so mais leve - necessario para caber no ambiente de deploy em nuvem
# (Streamlit Community Cloud, RAM/disco limitados). O pacote reduzido e
# baixado automaticamente pelo app quando ausente (ver
# src/cloud_data_bootstrap.py).

tse:
  consulta_candidatos:
    descricao: "Registro oficial de candidaturas: partido, coligacao/federacao, situacao da candidatura, resultado final por turno - SP"
    fonte: "TSE - Consulta de candidatos (dadosabertos.tse.jus.br)"
    ano: 2024
    arquivo_local: "data/raw/consulta_cand_2024_SP.parquet"
    url_padrao: "https://cdn.tse.jus.br/estatistica/sead/odsele/consulta_cand/consulta_cand_2024.zip"

  votacao_secao:
    descricao: "Votacao por secao eleitoral - Eleicoes Municipais 2024 - SP"
    fonte: "TSE - Repositorio de dados eleitorais (dadosabertos.tse.jus.br)"
    ano: 2024
    arquivo_local: "data/raw/votacao_secao_2024_SP.parquet"
    url_padrao: "https://cdn.tse.jus.br/estatistica/sead/odsele/votacao_secao/votacao_secao_2024_{uf}.zip"

  eleitorado_local_votacao:
    descricao: "Local de votacao com endereco e coordenadas - filtrado para SP"
    fonte: "TSE - Eleitorado por local de votacao (dadosabertos.tse.jus.br)"
    ano: 2024
    arquivo_local: "data/raw/eleitorado_local_votacao_SP.parquet"
    url_padrao: "https://cdn.tse.jus.br/estatistica/sead/odsele/eleitorado_locais_votacao/eleitorado_local_votacao_2024.zip"
    observacao: "Arquivo original e nacional; reduzido aqui para SG_UF='SP'. NR_LATITUDE/NR_LONGITUDE ja no formato correto (diferente do recorte Santos legado, ver eleitorado_local_votacao_santos_legado)."

  detalhe_votacao_secao_sp:
    descricao: "Comparecimento, abstencao, votos brancos/nulos/legenda por secao - SP"
    fonte: "TSE - Detalhe da votacao por secao (dadosabertos.tse.jus.br)"
    ano: 2024
    arquivo_local: "data/raw/detalhe_votacao_secao_2024_SP.parquet"
    url_padrao: "https://cdn.tse.jus.br/estatistica/sead/odsele/detalhe_votacao_secao/detalhe_votacao_secao_2024.zip"

  eleitorado_local_votacao_santos_legado:
    descricao: "Recorte legado (exportacao Excel) do eleitorado por local de votacao - apenas Santos/SP"
    fonte: "TSE - Eleitorado por local de votacao (recorte manual anterior)"
    ano: 2024
    arquivo_local: "C:/Users/Tales/Downloads/DADOS_SANTOS_ELEITORAL.csv"
    separador: ";"
    encoding: "latin-1"
    observacao: "NR_LATITUDE/NR_LONGITUDE e NR_TELEFONE_LOCAL exportados com formatacao numerica corrompida pelo Excel (virgula decimal virou separador de milhar). Corrigidos em data_cleaning.py. Preferir eleitorado_local_votacao (nacional, sem corrupcao) quando disponivel. Nao usado em producao/nuvem."

  bairros_secao_zona_santos:
    descricao: "Correspondencia bairro x zona x secao eleitoral - Santos/SP (fonte auxiliar, apenas Santos)"
    fonte: "Levantamento manual baseado em dados da Prefeitura/TSE"
    ano: 2024
    arquivo_local: "C:/Users/Tales/Downloads/lista bairros por  secao e zona.xlsx"

